<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#33544A">
  <title>Diario de gastos</title>
  <link rel="apple-touch-icon" href="icono.png">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  body {
    margin: 0;
    padding: 0;
    background-color: #EEEAE0;
  }

  .dg-root {
    --paper: #EEEAE0;
    --paper-dark: #E3DDCC;
    --ink: #22302B;
    --ink-soft: #5B665F;
    --primary: #33544A;
    --primary-dark: #223A32;
    --accent: #B5651D;
    --accent-soft: #E8D3B8;
    --danger: #9C3D3D;
    --line: #CFC7B0;
    --white: #FBFAF6;

    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--ink);
    background: var(--paper);
    max-width: 440px;
    min-height: 100vh;
    margin: 0 auto;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,0.03);
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
  }

  .dg-header {
    background: var(--primary);
    color: var(--white);
    padding: 22px 22px 26px;
    position: relative;
  }
  .dg-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    letter-spacing: 0.05em;
    text-transform: capitalize;
    opacity: 0.85;
    margin: 0 0 8px;
    color: var(--accent-soft);
  }
  .dg-total {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 38px;
    line-height: 1;
    margin: 0;
  }
  .dg-total-label {
    font-size: 13px;
    opacity: 0.8;
    margin-top: 6px;
  }

  .dg-tabs {
    display: flex;
    gap: 4px;
    margin-top: 18px;
  }
  .dg-tab {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.03em;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.75);
    border: 1px solid rgba(255,255,255,0.15);
    transition: background 0.15s;
    user-select: none;
  }
  .dg-tab.active {
    background: var(--white);
    color: var(--primary-dark);
    border-color: var(--white);
    font-weight: 500;
  }

  .dg-month-nav {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: var(--primary-dark);
    padding: 8px 16px;
    border-radius: 8px;
    margin-top: 14px;
  }
  .dg-month-nav button {
    background: transparent;
    border: none;
    color: var(--white);
    font-size: 18px;
    cursor: pointer;
    padding: 0 10px;
    opacity: 0.7;
  }
  .dg-month-nav button:active { opacity: 1; }
  .dg-month-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--white);
    text-transform: capitalize;
  }

  .dg-goal-wrap {
    padding: 16px 22px 0;
    background: var(--paper);
  }
  .dg-goal-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .dg-goal-row b {
    color: var(--ink);
    cursor: pointer;
    border-bottom: 1px dashed var(--ink-soft);
  }
  .dg-goal-bar-bg {
    height: 7px;
    background: var(--paper-dark);
    border-radius: 999px;
    overflow: hidden;
  }
  .dg-goal-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: var(--accent);
    transition: width 0.3s ease;
  }
  .dg-goal-bar-fill.over { background: var(--danger); }
  .dg-goal-edit {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }
  .dg-goal-edit input {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 3px 6px;
    width: 100px;
    background: var(--white);
  }
  .dg-goal-edit button {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    border: none;
    background: var(--primary);
    color: var(--white);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
  }

  .dg-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 60px;
    padding: 18px 22px 4px;
    background: var(--paper);
  }
  .dg-bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .dg-bar {
    width: 100%;
    max-width: 22px;
    background: var(--primary);
    border-radius: 3px 3px 0 0;
    opacity: 0.85;
    min-height: 2px;
    transition: height 0.25s ease;
  }
  .dg-bar.today { background: var(--accent); opacity: 1; }
  .dg-bar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px;
    color: var(--ink-soft);
    text-transform: lowercase;
  }

  .dg-add-wrap {
    padding: 16px 22px;
    background: var(--paper);
  }
  .dg-add-box {
    display: flex;
    align-items: center;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    gap: 8px;
  }
  .dg-add-box input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--ink);
  }
  .dg-add-box input::placeholder { color: #B3AC98; }
  .dg-add-btn {
    border: none;
    background: var(--accent);
    color: var(--white);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .dg-add-btn:active { transform: scale(0.94); }
  .dg-hint {
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-top: 6px;
    padding-left: 2px;
  }
  .dg-error {
    font-size: 11.5px;
    color: var(--danger);
    margin-top: 6px;
    padding-left: 2px;
  }

  .dg-list {
    background: var(--white);
    padding: 6px 10px 14px;
    flex: 1;
    overflow-y: auto;
  }
  .dg-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 10px;
    border-bottom: 1px solid #F0EDE3;
  }
  .dg-row:last-child { border-bottom: none; }
  .dg-icon {
    font-size: 17px;
    width: 26px;
    text-align: center;
    flex-shrink: 0;
  }
  .dg-row-main { flex: 1; min-width: 0; }
  .dg-row-name {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dg-row-date {
    font-size: 10.5px;
    color: var(--ink-soft);
    font-family: 'IBM Plex Mono', monospace;
  }
  .dg-row-amount {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13.5px;
    color: var(--ink);
    flex-shrink: 0;
  }
  .dg-row-del {
    border: none;
    background: transparent;
    color: #C7BFA8;
    font-size: 15px;
    cursor: pointer;
    padding: 2px 4px;
    flex-shrink: 0;
  }
  .dg-row-del:hover { color: var(--danger); }

  .dg-empty {
    text-align: center;
    padding: 34px 20px;
    color: var(--ink-soft);
    font-size: 13px;
  }

  .dg-actions {
    display: flex;
    gap: 10px;
    padding: 16px 22px 26px;
    background: var(--paper);
    border-top: 1px solid var(--line);
  }
  .dg-btn-outline {
    flex: 1;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--white);
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .dg-btn-outline:active { background: var(--paper-dark); }
  .dg-text-danger { color: var(--danger); }
  </style>
</head>
<body>

<div class="dg-root">
  <div class="dg-header">
    <p class="dg-eyebrow" id="dg-eyebrow">Cargando...</p>
    <p class="dg-total" id="dg-total">$0</p>
    <p class="dg-total-label" id="dg-total-label">gastado hoy</p>
    <div class="dg-tabs">
      <div class="dg-tab active" data-view="hoy">hoy</div>
      <div class="dg-tab" data-view="semana">7 días</div>
      <div class="dg-tab" data-view="mes">mes</div>
    </div>
    
    <div class="dg-month-nav" id="dg-month-nav">
      <button id="nav-prev">◀</button>
      <div class="dg-month-label" id="dg-month-label"></div>
      <button id="nav-next">▶</button>
    </div>
  </div>

  <div class="dg-goal-wrap">
    <div id="dg-goal-display">
      <div class="dg-goal-row">
        <span>meta del mes: <b id="dg-goal-amount">sin definir</b></span>
        <span id="dg-goal-remaining"></span>
      </div>
      <div class="dg-goal-bar-bg"><div class="dg-goal-bar-fill" id="dg-goal-bar" style="width:0%"></div></div>
    </div>
    <div id="dg-goal-edit" class="dg-goal-edit" style="display:none">
      <input type="number" id="dg-goal-input" placeholder="ej: 150000" />
      <button id="dg-goal-save">guardar</button>
    </div>
  </div>

  <div class="dg-chart" id="dg-chart"></div>

  <div class="dg-add-wrap">
    <div class="dg-add-box">
      <input id="dg-input" type="text" placeholder="ej: colación 2500" autocomplete="off" />
      <button class="dg-add-btn" id="dg-add-btn">＋</button>
    </div>
    <p class="dg-hint" id="dg-hint">Escribe qué compraste y el precio, luego Enter.</p>
  </div>

  <div class="dg-list" id="dg-list"></div>

  <div class="dg-actions">
    <button class="dg-btn-outline" id="dg-export-btn">📥 Exportar Resumen</button>
    <button class="dg-btn-outline dg-text-danger" id="dg-reset-btn">🗑️ Eliminar Resumen</button>
  </div>
</div>

<script>
(function() {
  const STORE_KEY = 'expenses';
  const GOAL_KEY = 'monthly_goal';
  let entries = [];
  let goal = null;
  let currentView = 'hoy';
  
  let viewMonth = new Date().getMonth();
  let viewYear = new Date().getFullYear();

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);
  const pad = (n) => n.toString().padStart(2, '0');

  function fmt(n) {
    return '$' + Math.round(n).toLocaleString('es-CL');
  }

  function categoryFor(name) {
    const n = name.toLowerCase();
    if (/(café|cafe|te |té )/.test(n)) return '☕';
    if (/(almuerzo|colación|colacion|comida|sandwich|pan|empanada|sushi|pizza|completo)/.test(n)) return '🍽️';
    if (/(micro|bus|metro|uber|didi|bencina|taxi|colectivo|pasaje|peaje)/.test(n)) return '🚌';
    if (/(arriendo|luz|agua|gas|internet|casa|supermercado)/.test(n)) return '🏠';
    if (/(libro|apunte|fotocopia|cuaderno|lápiz|lapiz|universidad|matricula|matrícula)/.test(n)) return '📚';
    if (/(farmacia|remedio|medicamento|doctor|salud|dentista)/.test(n)) return '💊';
    if (/(cine|netflix|spotify|salida|carrete|bar|cerveza)/.test(n)) return '🎬';
    return '🛍️';
  }

  function parseEntry(raw) {
    const str = raw.trim();
    if (!str) return null;
    const match = str.match(/(-?[\d.,]+)\s*$/);
    if (!match) return null;
    let numStr = match[1];
    const name = str.slice(0, match.index).trim();
    if (!name) return null;
    numStr = numStr.replace(/\./g, '').replace(/,\d+$/, '').replace(/,/g, '');
    const amount = parseInt(numStr, 10);
    if (isNaN(amount) || amount <= 0) return null;
    return {
      id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
      name: name.charAt(0).toUpperCase() + name.slice(1),
      amount,
      date: new Date().toISOString() 
    };
  }

  async function loadData() {
    const res = localStorage.getItem(STORE_KEY);
    let parsed = res ? JSON.parse(res) : [];
    if (!Array.isArray(parsed)) parsed = [];
    
    entries = parsed.filter(e => {
      if (!e || typeof e.amount !== 'number' || !e.date) return false;
      return !isNaN(new Date(e.date).getTime());
    });
    
    if (entries.length !== parsed.length) {
      localStorage.setItem(STORE_KEY, JSON.stringify(entries));
    }
    
    const goalRes = localStorage.getItem(GOAL_KEY);
    goal = goalRes ? JSON.parse(goalRes) : null;
  }

  async function saveEntries() {
    localStorage.setItem(STORE_KEY, JSON.stringify(entries));
  }
  
  async function saveGoal() {
    localStorage.setItem(GOAL_KEY, JSON.stringify(goal));
  }

  function isSameDay(dateA, dateB) {
    return dateA.getFullYear() === dateB.getFullYear() &&
           dateA.getMonth() === dateB.getMonth() &&
           dateA.getDate() === dateB.getDate();
  }

  function renderRealDate() {
    const today = new Date();
    const days = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
    const months = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
    $('#dg-eyebrow').textContent = `${days[today.getDay()]}, ${today.getDate()} de ${months[today.getMonth()]} de ${today.getFullYear()}`;
  }

  function filterByView(view) {
    const now = new Date();
    if (view === 'hoy') {
      return entries.filter(e => isSameDay(new Date(e.date), now));
    }
    if (view === 'semana') {
      const cutoff = new Date(now);
      cutoff.setDate(cutoff.getDate() - 6);
      cutoff.setHours(0,0,0,0);
      return entries.filter(e => new Date(e.date) >= cutoff);
    }
    if (view === 'mes') {
      return entries.filter(e => {
        const d = new Date(e.date);
        return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
      });
    }
    return entries;
  }

  function renderHeader() {
    const viewData = filterByView(currentView);
    const total = viewData.reduce((s, e) => s + e.amount, 0);
    $('#dg-total').textContent = fmt(total);
    
    const monthNames = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
    
    if (currentView === 'hoy') $('#dg-total-label').textContent = 'gastado hoy';
    else if (currentView === 'semana') $('#dg-total-label').textContent = 'gastado en 7 días';
    else if (currentView === 'mes') {
       $('#dg-total-label').textContent = `gastado en ${monthNames[viewMonth]}`;
       $('#dg-month-label').textContent = `${monthNames[viewMonth]} ${viewYear}`;
    }

    if (currentView === 'mes') {
      $('#dg-month-nav').style.display = 'flex';
      $('#dg-chart').style.display = 'none';
    } else {
      $('#dg-month-nav').style.display = 'none';
      $('#dg-chart').style.display = 'flex';
    }
  }

  function renderGoal() {
    const viewData = filterByView('mes'); 
    const monthTotal = viewData.reduce((s, e) => s + e.amount, 0);
    
    if (goal && goal > 0) {
      $('#dg-goal-amount').textContent = fmt(goal);
      const remaining = goal - monthTotal;
      const pct = Math.min(100, (monthTotal / goal) * 100);
      const bar = $('#dg-goal-bar');
      bar.style.width = pct + '%';
      bar.classList.toggle('over', remaining < 0);
      
      const remainingEl = $('#dg-goal-remaining');
      if (remaining >= 0) {
        remainingEl.textContent = fmt(remaining) + ' disponible';
        remainingEl.style.color = 'var(--ink-soft)';
      } else {
        remainingEl.textContent = fmt(Math.abs(remaining)) + ' sobre la meta';
        remainingEl.style.color = 'var(--danger)';
      }
    } else {
      $('#dg-goal-amount').textContent = 'sin definir';
      $('#dg-goal-remaining').textContent = '';
      $('#dg-goal-bar').style.width = '0%';
    }
  }

  function renderChart() {
    if (currentView === 'mes') return; 

    const days = [];
    const now = new Date();
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      days.push(d);
    }
    const totals = days.map(d => {
      return entries.filter(e => isSameDay(new Date(e.date), d))
                     .reduce((s, e) => s + e.amount, 0);
    });
    const max = Math.max(...totals, 1);
    const chart = $('#dg-chart');
    chart.innerHTML = '';
    const dayLabels = ['do','lu','ma','mi','ju','vi','sá'];
    
    days.forEach((d, i) => {
      const col = document.createElement('div');
      col.className = 'dg-bar-col';
      const bar = document.createElement('div');
      bar.className = 'dg-bar' + (i === 6 ? ' today' : '');
      const h = Math.max(2, Math.round((totals[i] / max) * 46));
      bar.style.height = h + 'px';
      
      const label = document.createElement('div');
      label.className = 'dg-bar-label';
      label.textContent = dayLabels[d.getDay()];
      col.appendChild(bar);
      col.appendChild(label);
      chart.appendChild(col);
    });
  }

  function renderList() {
    const viewData = filterByView(currentView).slice().sort((a, b) => new Date(b.date) - new Date(a.date));
    const list = $('#dg-list');
    list.innerHTML = '';
    
    if (viewData.length === 0) {
      list.innerHTML = '<div class="dg-empty">Nada registrado en este periodo.</div>';
      return;
    }
    
    viewData.forEach(e => {
      const row = document.createElement('div');
      row.className = 'dg-row';
      const d = new Date(e.date);
      const timeStr = `${pad(d.getDate())}/${pad(d.getMonth()+1)} · ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      row.innerHTML = `
        <div class="dg-icon">${categoryFor(e.name)}</div>
        <div class="dg-row-main">
          <div class="dg-row-name">${e.name}</div>
          <div class="dg-row-date">${timeStr}</div>
        </div>
        <div class="dg-row-amount">${fmt(e.amount)}</div>
        <button class="dg-row-del" data-id="${e.id}">✕</button>
      `;
      list.appendChild(row);
    });

    list.querySelectorAll('.dg-row-del').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-id');
        entries = entries.filter(e => e.id !== id);
        await saveEntries();
        renderAll();
      });
    });
  }

  function renderAll() {
    renderRealDate();
    renderHeader();
    renderGoal();
    renderChart();
    renderList();
  }

  async function handleAdd() {
    const input = $('#dg-input');
    const hint = $('#dg-hint');
    const parsed = parseEntry(input.value);
    if (!parsed) {
      hint.textContent = 'Formato inválido. Prueba: "almuerzo 5000"';
      hint.className = 'dg-error';
      return;
    }
    entries.push(parsed);
    await saveEntries();
    
    input.value = '';
    hint.textContent = 'Gasto registrado correctamente.';
    hint.className = 'dg-hint';
    
    viewMonth = new Date().getMonth();
    viewYear = new Date().getFullYear();
    
    renderAll();
    
    setTimeout(() => {
      if (hint.textContent === 'Gasto registrado correctamente.') {
        hint.textContent = 'Escribe qué compraste y el precio, luego Enter.';
      }
    }, 2500);
  }

  function bindEvents() {
    $('#dg-add-btn').addEventListener('click', handleAdd);
    $('#dg-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleAdd();
    });

    $$('.dg-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        $$('.dg-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentView = tab.getAttribute('data-view');
        if(currentView === 'mes') {
          viewMonth = new Date().getMonth();
          viewYear = new Date().getFullYear();
        }
        renderAll();
      });
    });

    $('#nav-prev').addEventListener('click', () => {
      viewMonth--;
      if (viewMonth < 0) {
        viewMonth = 11;
        viewYear--;
      }
      renderAll();
    });
    $('#nav-next').addEventListener('click', () => {
      viewMonth++;
      if (viewMonth > 11) {
        viewMonth = 0;
        viewYear++;
      }
      renderAll();
    });

    $('#dg-goal-amount').addEventListener('click', () => {
      $('#dg-goal-display').querySelector('.dg-goal-bar-bg').style.display = 'none';
      $('#dg-goal-edit').style.display = 'flex';
      $('#dg-goal-input').value = goal || '';
      $('#dg-goal-input').focus();
    });

    $('#dg-goal-save').addEventListener('click', async () => {
      const val = parseInt($('#dg-goal-input').value, 10);
      if (!isNaN(val) && val > 0) {
        goal = val;
        await saveGoal();
      }
      $('#dg-goal-edit').style.display = 'none';
      $('#dg-goal-display').querySelector('.dg-goal-bar-bg').style.display = 'block';
      renderAll();
    });

    $('#dg-goal-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('#dg-goal-save').click();
    });
    
    $('#dg-export-btn').addEventListener('click', async () => {
      const viewData = filterByView(currentView);
      if (viewData.length === 0) {
        alert('No hay gastos en esta vista para exportar.');
        return;
      }
      let csv = 'Fecha,Hora,Categoria,Gasto,Monto\n';
      viewData.forEach(e => {
        const d = new Date(e.date);
        const dateStr = `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
        const timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
        const cat = categoryFor(e.name);
        csv += `${dateStr},${timeStr},${cat},${e.name},${e.amount}\n`;
      });
      
      const filename = `Resumen_Gastos_${new Date().getTime()}.csv`;
      const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
      
      // Intentar API de compartir nativa (Estándar para iOS PWA)
      if (navigator.share && navigator.canShare) {
        try {
          const file = new File([blob], filename, { type: 'text/csv' });
          if (navigator.canShare({ files: [file] })) {
            await navigator.share({
              title: 'Resumen de Gastos',
              files: [file]
            });
            return;
          }
        } catch (error) {
          console.log('Share API falló o fue cancelada.');
        }
      }
      
      // Fallback tradicional
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    $('#dg-reset-btn').addEventListener('click', async () => {
      let mensaje = '';
      if (currentView === 'hoy') mensaje = '¿Eliminar gastos de HOY?';
      else if (currentView === 'semana') mensaje = '¿Eliminar gastos de los ÚLTIMOS 7 DÍAS?';
      else if (currentView === 'mes') mensaje = `¿Eliminar gastos de ${$('#dg-month-label').textContent}?`;

      if (confirm(mensaje + ' Esta acción no se puede deshacer.')) {
        const idsToRemove = filterByView(currentView).map(e => e.id);
        entries = entries.filter(e => !idsToRemove.includes(e.id));
        await saveEntries();
        renderAll();
      }
    });
  }

  async function init() {
    try {
      await loadData();
      bindEvents();
      renderAll();
    } catch (e) {
      $('#dg-hint').textContent = 'Error crítico: ' + e.message;
      $('#dg-hint').className = 'dg-error';
    }
  }

  init();
})();
</script>
</body>
</html>
