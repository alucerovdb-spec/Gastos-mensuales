<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#33544A">
  <title>Diario de gastos</title>
  <link rel="apple-touch-icon" href="icono.png">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  body {
    margin: 0;
    padding: 0;
    background-color: #EEEAE0;
  }

  .dg-root {
    --paper: #EEEAE0;
    --paper-dark: #E3DDCC;
    --ink: #22302B;
    --ink-soft: #5B665F;
    --primary: #33544A;
    --primary-dark: #223A32;
    --accent: #B5651D;
    --accent-soft: #E8D3B8;
    --danger: #9C3D3D;
    --line: #CFC7B0;
    --white: #FBFAF6;

    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--ink);
    background: var(--paper);
    max-width: 440px;
    min-height: 100vh;
    margin: 0 auto;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,0.03);
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
  }

  .dg-header {
    background: var(--primary);
    color: var(--white);
    padding: 22px 22px 26px;
    position: relative;
  }
  .dg-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    letter-spacing: 0.05em;
    text-transform: capitalize;
    opacity: 0.85;
    margin: 0 0 8px;
    color: var(--accent-soft);
  }
  .dg-total {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 38px;
    line-height: 1;
    margin: 0;
  }
  .dg-total-label {
    font-size: 13px;
    opacity: 0.8;
    margin-top: 6px;
  }

  .dg-tabs {
    display: flex;
    gap: 4px;
    margin-top: 18px;
  }
  .dg-tab {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.03em;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.75);
    border: 1px solid rgba(255,255,255,0.15);
    transition: background 0.15s;
    user-select: none;
  }
  .dg-tab.active {
    background: var(--white);
    color: var(--primary-dark);
    border-color: var(--white);
    font-weight: 500;
  }

  .dg-month-nav {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: var(--primary-dark);
    padding: 8px 16px;
    border-radius: 8px;
    margin-top: 14px;
  }
  .dg-month-nav button {
    background: transparent;
    border: none;
    color: var(--white);
    font-size: 18px;
    cursor: pointer;
    padding: 0 10px;
    opacity: 0.7;
  }
  .dg-month-nav button:active { opacity: 1; }
  .dg-month-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--white);
    text-transform: capitalize;
  }

  .dg-goal-wrap {
    padding: 16px 22px 0;
    background: var(--paper);
  }
  .dg-goal-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .dg-goal-row b {
    color: var(--ink);
    cursor: pointer;
    border-bottom: 1px dashed var(--ink-soft);
  }
  .dg-goal-bar-bg {
    height: 7px;
    background: var(--paper-dark);
    border-radius: 999px;
    overflow: hidden;
  }
  .dg-goal-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: var(--accent);
    transition: width 0.3s ease;
  }
  .dg-goal-bar-fill.over { background: var(--danger); }
  .dg-goal-edit {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }
  .dg-goal-edit input {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 3px 6px;
    width: 100px;
    background: var(--white);
  }
  .dg-goal-edit button {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    border: none;
    background: var(--primary);
    color: var(--white);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
  }

  .dg-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 60px;
    padding: 18px 22px 4px;
    background: var(--paper);
  }
  .dg-bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .dg-bar {
    width: 100%;
    max-width: 22px;
    background: var(--primary);
    border-radius: 3px 3px 0 0;
    opacity: 0.85;
    min-height: 2px;
    transition: height 0.25s ease;
  }
  .dg-bar.today { background: var(--accent); opacity: 1; }
  .dg-bar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px;
    color: var(--ink-soft);
    text-transform: lowercase;
  }

  .dg-add-wrap {
    padding: 16px 22px;
    background: var(--paper);
  }
  .dg-add-box {
    display: flex;
    align-items: center;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    gap: 8px;
  }
  .dg-add-box input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--ink);
  }
  .dg-add-box input::placeholder { color: #B3AC98; }
  .dg-add-btn {
    border: none;
    background: var(--accent);
    color: var(--white);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .dg-add-btn:active { transform: scale(0.94); }
  .dg-hint {
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-top: 6px;
    padding-left: 2px;
  }
  .dg-error {
    font-size: 11.5px;
    color: var(--danger);
    margin-top: 6px;
    padding-left: 2px;
  }

  .dg-perf {
    height: 14px;
    background:
      radial-gradient(circle at 6px 0, transparent 6px, var(--paper) 6.5px) repeat-x,
      var(--white);
    background-size: 16px 16px;
    border-bottom: 1px dashed var(--line);
  }

  .dg-list {
    background: var(--white);
    padding: 6px 10px 14px;
    flex: 1;
    overflow-y: auto;
  }
  .dg-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 10px;
    border-bottom: 1px solid #F0EDE3;
  }
  .dg-row:last-child { border-bottom: none; }
  .dg-icon {
    font-size: 17px;
    width: 26px;
    text-align: center;
    flex-shrink: 0;
  }
  .dg-row-main { flex: 1; min-width: 0; }
  .dg-row-name {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dg-row-date {
    font-size: 10.5px;
    color: var(--ink-soft);
    font-family: 'IBM Plex Mono', monospace;
  }
  .dg-row-amount {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13.5px;
    color: var(--ink);
    flex-shrink: 0;
  }
  .dg-row-del {
    border: none;
    background: transparent;
    color: #C7BFA8;
    font-size: 15px;
    cursor: pointer;
    padding: 2px 4px;
    flex-shrink: 0;
  }
  .dg-row-del:hover { color: var(--danger); }

  .dg-empty {
    text-align: center;
    padding: 34px 20px;
    color: var(--ink-soft);
    font-size: 13px;
  }

  .dg-actions {
    display: flex;
    gap: 10px;
    padding: 16px 22px 26px;
    background: var(--paper);
    border-top: 1px solid var(--line);
  }
  .dg-btn-outline {
    flex: 1;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--white);
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .dg-btn-outline:active {
    background: var(--paper-dark);
  }
  .dg-text-danger {
    color: var(--danger);
  }
  </style>
</head>
<body>

<div class="dg-root">
  <div class="dg-header">
    <p class="dg-eyebrow" id="dg-eyebrow">Diario de gastos</p>
    <p class="dg-total" id="dg-total">$0</p>
    <p class="dg-total-label" id="dg-total-label">gastado hoy</p>
    <div class="dg-tabs">
      <div class="dg-tab active" data-view="hoy">hoy</div>
      <div class="dg-tab" data-view="semana">7 días</div>
      <div class="dg-tab" data-view="mes">mes</div>
    </div>
    
    <div class="dg-month-nav" id="dg-month-nav">
      <button id="nav-prev">◀</button>
      <div class="dg-month-label" id="dg-month-label"></div>
      <button id="nav-next">▶</button>
    </div>
  </div>

  <div class="dg-goal-wrap">
    <div id="dg-goal-display">
      <div class="dg-goal-row">
        <span>meta del mes: <b id="dg-goal-amount">sin definir</b></span>
        <span id="dg-goal-remaining"></span>
      </div>
      <div class="dg-goal-bar-bg"><div class="dg-goal-bar-fill" id="dg-goal-bar" style="width:0%"></div></div>
    </div>
    <div id="dg-goal-edit" class="dg-goal-edit" style="display:none">
      <input type="number" id="dg-goal-input" placeholder="ej: 150000" />
      <button id="dg-goal-save">guardar</button>
    </div>
  </div>

  <div class="dg-chart" id="dg-chart"></div>

  <div class="dg-add-wrap">
    <div class="dg-add-box">
      <input id="dg-input" type="text" placeholder="ej: colación 2500" autocomplete="off" />
      <button class="dg-add-btn" id="dg-add-btn">＋</button>
    </div>
    <p class="dg-hint" id="dg-hint">Escribe qué compraste y el precio, luego Enter.</p>
  </div>

  <div class="dg-perf"></div>
  <div class="dg-list" id="dg-list"></div>

  <div class="dg-actions">
    <button class="dg-btn-outline" id="dg-export-btn">📥 Exportar Vista</button>
    <button class="dg-btn-outline dg-text-danger" id="dg-reset-btn">🗑️ Eliminar Vista</button>
  </div>
</div>

<script>
(function() {
  const STORE_KEY = 'expenses';
  const GOAL_KEY = 'monthly_goal';
  let entries = [];
  let goal = null;
  let currentView = 'hoy';
  
  let viewMonth = new Date().getMonth();
  let viewYear = new Date().getFullYear();

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  function fmt(n) {
    return '$' + Math.round(n).toLocaleString('es-CL');
  }

  function todayKey(d) {
    return d.toLocaleDateString('en-CA');
  }

  function categoryFor(name) {
    const n = name.toLowerCase();
    if (/(café|cafe|te |té )/.test(n)) return '☕';
    if (/(almuerzo|colación|colacion|comida|sandwich|pan|empanada|sushi|pizza|completo)/.test(n)) return '🍽️';
    if (/(micro|bus|metro|uber|didi|bencina|taxi|colectivo|pasaje|peaje)/.test(n)) return '🚌';
    if (/(arriendo|luz|agua|gas|internet|casa|supermercado)/.test(n)) return '🏠';
    if (/(libro|apunte|fotocopia|cuaderno|lápiz|lapiz|universidad|matricula|matrícula)/.test(n)) return '📚';
    if (/(farmacia|remedio|medicamento|doctor|salud|dentista)/.test(n)) return '💊';
    if (/(cine|netflix|spotify|salida|carrete|bar|cerveza)/.test(n)) return '🎬';
    return '🛍️';
  }

  function parseEntry(raw) {
    const str = raw.trim();
    if (!str) return null;
    const match = str.match(/(-?[\d.,]+)\s*$/);
    if (!match) return null;
    let numStr = match[1];
    const name = str.slice(0, match.index).trim();
    if (!name) return null;
    numStr = numStr.replace(/\./g, '').replace(/,\d+$/, '').replace(/,/g, '');
    const amount = parseInt(numStr, 10);
    if (isNaN(amount) || amount <= 0) return null;
    return {
      id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
      name: name.charAt(0).toUpperCase() + name.slice(1),
      amount,
      date: new Date().toISOString() 
    };
  }

  async function loadData() {
    try {
      const res = localStorage.getItem(STORE_KEY);
      let parsed = res ? JSON.parse(res) : [];
      if (!Array.isArray(
